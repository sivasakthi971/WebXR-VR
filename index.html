<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- Local AR -->
    <script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

    <title>MarkLess - Fruity AR</title>

    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>

<body>

<script>
function showMessage(message){
    let hud = document.querySelector("#hud");
    if(hud){
        hud.setAttribute('value', message);
    }
}

AFRAME.registerComponent('ar-logic',{
    init: function(){
        showMessage('🍓 Fruity AR Ready');
    },

    tick : function(){
        let cam = document.querySelector("#cam");
        if(!cam || !cam.components.raycaster){ return; }

        let collision = cam.components.raycaster.getIntersection(this.el);
        if(!collision){ return; }

        let point = collision.point;

        showMessage(
            '📍 X:' + point.x.toFixed(2) +
            ' Z:' + point.z.toFixed(2)
        );

        let circle = document.querySelector("#circle");
        if(circle){
            circle.setAttribute('position', point);
        }
    }
});

// Place model on touch
window.addEventListener('touchstart', function(){
    let box = document.querySelector("#box");
    let circle = document.querySelector("#circle");

    if(!box || !circle) return;

    let pos = circle.getAttribute('position');
    box.setAttribute('position', pos);

    showMessage("🍉 Object Placed!");
});
</script>

<a-scene ar ar-logic background="color: #FFF8E7">

    <!-- Camera -->
    <a-camera id="cam" ar-raycaster raycaster="objects:.clickable;">
        <a-text id="hud" 
            value="Loading..." 
            position="0 -0.1 -0.25"
            align="center"
            color="#FF4081">
        </a-text>
    </a-camera>

    <!-- 🍉 Ground -->
    <a-plane 
        class="clickable"
        rotation="-90 0 0" 
        width="20" 
        height="20"
        color="#A5D6A7"
        material="shader: standard; roughness:0.8;">
    </a-plane>

    <!-- 🎯 Cursor -->
    <a-ring
        id="circle"
        class="clickable"
        rotation="-90 0 0"
        radius-inner="0.07"
        radius-outer="0.09"
        color="#FF9800"
        material="emissive: #FFA726; emissiveIntensity: 0.9">
    </a-ring>

    <!-- 🍎 Apple -->
    <a-sphere 
        class="clickable"
        position="1 0.5 -2" 
        radius="0.3"
        color="#E53935"
        material="emissive:#FF5252; emissiveIntensity:0.5">
    </a-sphere>

    <!-- 🍊 Orange -->
    <a-sphere 
        class="clickable"
        position="-1 0.5 -2" 
        radius="0.3"
        color="#FB8C00"
        material="emissive:#FFA726; emissiveIntensity:0.5">
    </a-sphere>

    <!-- 🍉 Watermelon -->
    <a-cylinder 
        class="clickable"
        position="0 0.4 -3" 
        radius="0.4"
        height="0.3"
        color="#2E7D32"
        material="emissive:#66BB6A; emissiveIntensity:0.4">
    </a-cylinder>

    <!-- 🍇 Grapes -->
    <a-entity position="2 0.5 -3" class="clickable">
        <a-sphere radius="0.15" position="0 0 0" color="#6A1B9A"></a-sphere>
        <a-sphere radius="0.15" position="0.2 0 0" color="#8E24AA"></a-sphere>
        <a-sphere radius="0.15" position="-0.2 0 0" color="#7B1FA2"></a-sphere>
    </a-entity>

    <!-- 🍍 Pineapple -->
    <a-cone 
        class="clickable"
        position="-2 0.5 -3"
        radius-bottom="0.3"
        height="0.6"
        color="#FDD835"
        material="emissive:#FFF176; emissiveIntensity:0.4">
    </a-cone>

    <!-- 🎯 Your Model -->
    <a-gltf-model id="box"
        src="./model/deadpool.glb"
        scale="1 1 1"
        position="0 0 0">
    </a-gltf-model>

</a-scene>

</body>
</html>
