<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VR Fruit Gallery</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body { margin: 0; }
  </style>

<script>
AFRAME.registerComponent('show-model', {
  schema: {
    message: { type: 'string' },
    model: { type: 'selector' }
  },

  init: function () {
    this.el.addEventListener('click', () => {

      document.querySelector('#infoText')
        .setAttribute('value', this.data.message);

      document.querySelectorAll('.fruit-model')
        .forEach(m => m.setAttribute('visible', false));

      if (this.data.model) {
        this.data.model.setAttribute('visible', true);
      }

    });
  }
});
</script>

</head>

<body>

<a-scene background="color: #0F0F14">

  <!-- CAMERA -->
  <a-entity position="0 0 3" wasd-controls>
    <a-entity camera look-controls position="0 1.6 0">
      <a-cursor raycaster="objects: .clickable" color="#FF6B6B"></a-cursor>
    </a-entity>
  </a-entity>

  <!-- LIGHTING -->
  <a-light type="ambient" intensity="0.6" color="#ffffff"></a-light>
  <a-light type="directional" position="2 5 3" intensity="0.7"></a-light>

  <!-- 🍇 GLOW LIGHTS -->
  <a-entity light="type: point; color: #FF3B3B; intensity: 0.7" position="0 3 -5"></a-entity>
  <a-entity light="type: point; color: #FFD600; intensity: 0.7" position="-5 3 0"></a-entity>
  <a-entity light="type: point; color: #00E676; intensity: 0.7" position="5 3 0"></a-entity>

  <!-- FLOOR -->
  <a-plane position="0 -1 0" rotation="-90 0 0"
           width="12" height="12"
           color="#1A1A1A">
  </a-plane>

  <!-- 🍉 GLOWING FRUIT WALLS -->

  <!-- Back Wall -->
  <a-plane position="0 2 -6"
           width="12" height="5"
           color="#2B0B0B"
           material="emissive:#FF3B3B; emissiveIntensity:0.35">
  </a-plane>

  <!-- Left Wall -->
  <a-plane position="-6 2 0"
           rotation="0 90 0"
           width="12" height="5"
           color="#2B2600"
           material="emissive:#FFD600; emissiveIntensity:0.35">
  </a-plane>

  <!-- Right Wall -->
  <a-plane position="6 2 0"
           rotation="0 -90 0"
           width="12" height="5"
           color="#0B2B1B"
           material="emissive:#00E676; emissiveIntensity:0.35">
  </a-plane>

  <!-- CEILING -->
  <a-plane position="0 5 0"
           rotation="90 0 0"
           width="12" height="12"
           color="#111111">
  </a-plane>

  <!-- TEXT -->
  <a-text id="infoText"
          value="Fruit Gallery"
          position="0 4 -5.8"
          align="center"
          width="10"
          color="#FF4D4D"
          material="emissive:#FF4D4D; emissiveIntensity:0.6">
  </a-text>

  <!-- ================= MODELS ================= -->

  <a-entity id="apple3D" class="fruit-model"
            gltf-model="models/red_apple.glb"
            position="0 0 2"
            scale="0.8 0.8 0.8"
            visible="false"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
  </a-entity>

  <a-entity id="banana3D" class="fruit-model"
            gltf-model="models/banana_3d_scan.glb"
            position="0 0 2"
            scale="1 1 1"
            visible="false"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
  </a-entity>

  <a-entity id="orange3D" class="fruit-model"
            gltf-model="models/orange.glb"
            position="0 0 2"
            scale="0.8 0.8 0.8"
            visible="false"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
  </a-entity>

  <a-entity id="strawberry3D" class="fruit-model"
            gltf-model="models/strawberry_real_design.glb"
            position="0 0 2"
            scale="0.5 0.5 0.5"
            visible="false"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
  </a-entity>

  <a-entity id="watermelon3D" class="fruit-model"
            gltf-model="models/watermelon.glb"
            position="0 0 2"
            scale="0.6 0.6 0.6"
            visible="false"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
  </a-entity>

  <!-- ================= POSTERS ================= -->

  <a-plane class="clickable"
           src="images/apple.png"
           position="-4 1.6 -5.9"
           width="2" height="2"
           material="emissive:#FF3B3B; emissiveIntensity:0.3"
           show-model="message: Apple - Healthy & Sweet; model: #apple3D">
  </a-plane>

  <a-plane class="clickable"
           src="images/banana.png"
           position="-2 1.6 -5.9"
           width="2" height="2"
           material="emissive:#FFD600; emissiveIntensity:0.3"
           show-model="message: Banana - Energy Booster; model: #banana3D">
  </a-plane>

  <a-plane class="clickable"
           src="images/orange.png"
           position="0 1.6 -5.9"
           width="2" height="2"
           material="emissive:#FFA726; emissiveIntensity:0.3"
           show-model="message: Orange - Rich in Vitamin C; model: #orange3D">
  </a-plane>

  <a-plane class="clickable"
           src="images/strawberry.png"
           position="2 1.6 -5.9"
           width="2" height="2"
           material="emissive:#FF4081; emissiveIntensity:0.3"
           show-model="message: Strawberry - Fresh & Juicy; model: #strawberry3D">
  </a-plane>

  <a-plane class="clickable"
           src="images/watermelon.png"
           position="4 1.6 -5.9"
           width="2" height="2"
           material="emissive:#66BB6A; emissiveIntensity:0.3"
           show-model="message: Watermelon - Refreshing & Cool; model: #watermelon3D">
  </a-plane>

</a-scene>

</body>
</html>
